name: Terraform CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
      action:
        description: Terraform action
        required: true
        type: choice
        default: apply
        options:
          - apply
          - destroy
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "env/*.tfvars"
      - "backend/backend-*.conf"
      - ".github/workflows/terraform-cd.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-cd-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_VERSION: 1.13.4
  DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  DEPLOY_ACTION: ${{ github.event.inputs.action || 'apply' }}
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  deploy:
    name: ${{ github.event.inputs.action || 'apply' }} ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend-config="backend/backend-${DEPLOY_ENVIRONMENT}.conf"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          if [ "${DEPLOY_ACTION}" = "destroy" ]; then
            terraform plan -destroy -input=false -var-file="env/${DEPLOY_ENVIRONMENT}.tfvars" -out="${DEPLOY_ENVIRONMENT}.tfplan"
          else
            terraform plan -input=false -var-file="env/${DEPLOY_ENVIRONMENT}.tfvars" -out="${DEPLOY_ENVIRONMENT}.tfplan"
          fi

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve "${DEPLOY_ENVIRONMENT}.tfplan"
