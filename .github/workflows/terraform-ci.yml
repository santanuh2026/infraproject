name: Terraform CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "env/*.tfvars"
      - "backend/backend-*.conf"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_VERSION: 1.13.4
  TFLINT_VERSION: v0.59.1

jobs:
  discover:
    name: Discover environments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build environment matrix
        id: matrix
        shell: bash
        run: |
          environments=$(find env -maxdepth 1 -name '*.tfvars' -printf '%f\n' | sed 's/\.tfvars$//' | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix={\"environment\":${environments}}" >> "$GITHUB_OUTPUT"

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    needs: discover
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: TFLint
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: tflint --init && tflint --recursive

      # - name: Checkov
      #   uses: bridgecrewio/checkov-action@v12
      #   with:
      #     directory: .
      #     framework: terraform
      #     quiet: true
      #     skip_check: CKV2_AZURE_1,CKV2_AZURE_33,CKV2_AZURE_41,CKV_AZURE_33

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          skip_check: "CKV_AZURE_33,CKV_AZURE_206,CKV_AZURE_59,CKV2_AZURE_33,CKV2_AZURE_41,CKV2_AZURE_1,CKV2_AZURE_38,CKV2_AZURE_40"    

  plan:
    name: Plan ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs:
      - discover
      - static-analysis
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    environment: ${{ matrix.environment }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config="backend/backend-${{ matrix.environment }}.conf"

      - name: Terraform plan
        run: terraform plan -input=false -var-file="env/${{ matrix.environment }}.tfvars" -out="${{ matrix.environment }}.tfplan"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: ${{ matrix.environment }}.tfplan
          retention-days: 7
